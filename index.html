<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sayeka-assign</title>
     
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style.css">

    <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class=" bg-gray-100">
     <!-- nav section -->
   <nav class="top-bar bg-white border-b px-4 py-4 mb-8">
         <div class="flex flex-col md:flex-row justify-between items-center max-w-6xl mx-auto gap-4">
        
            <h3 class="header text-xl font-bold">
             <i class="fa-brands fa-github mr-2"></i> GitHub Issues Tracker
            </h3>

        <div class="top-bar-right flex items-center gap-3 w-full md:w-auto">
            <div class="relative w-full md:w-auto">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" placeholder="Search Issues" class="border pl-10 pr-4 py-2 border-gray-300 rounded-md w-full md:w-64 outline-none">
            </div>

            <button class="bg-[#4F16F0] text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2 shrink-0">
                <i class="fa-solid fa-plus text-sm"></i> New Issue
            </button>
        </div>
        
    </div>
</nav>

    <main class="w-[80%] mx-auto">
        
           <div class="flex gap-4 bg-white px-4 py-4">
               <button onclick="toggleStyle('all-filter-btn')" class="bg-blue-500 text-white font-semibold text-xs rounded-sm px-5 py-2 border-gray-200" id="all-filter-btn">All</button>
               <button onclick="toggleStyle('open-filter-btn')" class="bg-white text-gray-800 font-semibold text-xs rounded-sm px-5 py-2 border-gray-200" id="open-filter-btn">Open</button>
               <button onclick="toggleStyle('closed-filter-btn')" class="bg-white  text-gray-800 font-semibold text-xs rounded-sm px-5 py-2" id="closed-filter-btn">Closed</button>
           </div>


           <section class="mt-4">
                 <div class="bg-white border p-6 flex flex-col sm:flex-row justify-between items-center gap-4  border-gray-100 rounded-xl">
                   <div class="flex items-center gap-4">
                       <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center text-[#4F16F0]">
                           <i class="fa-solid fa-circle-notch text-xl"></i>
                       </div>
                        <div>
                            <h2 class="issu-count text-xl font-bold text-gray-800">50 Issues</h2>
                            <p class="text-gray-400 text-sm">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-6 text-sm font-semibold">
                        <div class="flex items-center gap-2">
                            <span class="open-green w-3 h-3 bg-emerald-500 rounded-full"></span>
                            <span>Open</span>
                        </div>
                        <div class="flex items-center gap-2">
                             <span class="closed-purple w-3 h-3 bg-[#A855F7] rounded-full"></span>
                            <span>Closed</span>
                        </div>
                    </div>
                </div>
           </section>

    </main>

</body>



</html>
