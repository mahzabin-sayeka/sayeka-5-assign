    <!-- login -->

    <section>
        <div id="login-section" class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-10">
            <div class="flex justify-center mb-4">
                <i class="fa-brands fa-github text-6xl text-slate-800"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">GitHub Issues Tracker</h1>
            <p class="text-slate-400 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Username</label>
                <input type="text" id="username" placeholder="Enter Username" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-700">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-700">
            </div>
            <button type="submit" 
                class="w-full bg-[#4F16F0] text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg active:scale-[0.98]">
                Sign In
            </button>
        </form>
    </div>
</div>

     <nav class="uporer-bar bg-white border-b px-6 md:px-20 py-4 mb-8">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-full mx-auto gap-4">

            <div class="nav-right flex items-center gap-3 w-full md:w-auto">

                    <input id="serach-box-input" type="text" placeholder="Search Issues" class="border pl-10 pr-4 py-2 border-gray-300 rounded-md w-full md:w-64 outline-none focus:ring-1 focus:ring-indigo-300">

                <button class="bg-[#4F16F0] text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2 shrink-0">

    <main class="main-conatiner-box w-[90%] md:w-[80%] mx-auto pb-20">
        
           
 <!-- all open closed -->
           <div class="filter-er-jayga flex gap-4 bg-white px-4 py-4">
               <button data-filter="all" class="tab-btun bg-[#4F16F0] text-white font-semibold text-xs rounded-sm px-5 py-2">All</button>
            <button data-filter="open" class="tab-btun bg-white text-gray-800 font-semibold text-xs rounded-sm px-5 py-2 border border-gray-200">Open</button>
            <button data-filter="closed" class="tab-btun bg-white text-gray-800 font-semibold text-xs rounded-sm px-5 py-2 border border-gray-200">Closed</button>
           </div>


           <section class="nicher-onsho mt-4">

 <!-- carrt header -->
                
                   <div class="all-card-header bg-white border p-6 flex flex-col sm:flex-row justify-between items-center gap-4 border-gray-100 rounded-xl mb-8">
                <div class="flex items-center gap-4">
                    <div class="box-round w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center text-[#4F16F0]">
                        <i class="fa-solid fa-circle-notch text-xl"></i>

                        <h2 id="total-issu-count" class="text-xl font-bold text-gray-800">0 Issues</h2>
                        <p class="text-gray-400 text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-6 text-sm font-semibold text-gray-500 uppercase tracking-tighter">

                        <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                        <span>Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                         <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                        <span>Closed</span>
                    </div>
                </div>
            </div>

             <div id="isue-grid-box" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
